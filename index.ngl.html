<!DOCTYPE html>

<html lang="en" xmlns="http://www.vercel.com/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>  taskflow-project </title>
    <!-- Tailwind via CDN so you can start using utility classes (dark mode based on .dark class) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        };
    </script>
    <link rel="stylesheet" href="StyleSheet1.css">

    </head>


    <body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">

        <div class="container">
            <div class="menu-toggle" id="menuToggle">
                <span class="menu-icon">&#9776;</span>
            </div>

            <nav class="sidebar" id="sidebar">
                <button class="close-btn" id="closeMenu">×</button>
                <ul class="sidebar-menu">
                    <li><a href="#" onclick="showSection('taskSection')">📝 Tareas</a></li>
                    <li><a href="#" onclick="showSection('calendarSection')">📅 Calendario</a></li>
                    <li><a href="#" onclick="showSection('notesSection')">🗒️ Notas</a></li>
                    <li><a href="#">⚙️ Configuración</a></li>
                </ul>
            </nav>

            <div class="content">

                <header>
                    <div class="header-content">
                        <h1>Taskflow ORKSHOP Project</h1>
                        
                        <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>
                    </div>
                </header>

                <main>
                    <section id="taskFilterSection">
                        <label for="taskFilter">Filtrar por prioridad:</label>
                        <select id="taskFilter" onchange="filterTasks()">
                            <option value="all">Todas</option>
                            <option value="Alta">Alta</option>
                            <option value="Media/Alta">Media/Alta</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </section>

                    <section id="taskSection">
                        <div class="add-task app">
                            <h2>Mis tareas</h2>
                            <!-- Formulario conectado a Script2.js (newTaskTitle, newTaskCategory, newTaskPriority) -->
                            <form id="taskForm" class="task-form">
                                <input type="text" id="newTaskTitle" placeholder="Nueva tarea" required />

                                <select id="newTaskCategory">
                                    <option value="Trabajo">Trabajo</option>
                                    <option value="Formación">Formación</option>
                                    <option value="Equipo">Equipo</option>
                                    <option value="Personal">Personal</option>
                                </select>

                                <select id="newTaskPriority">
                                    <option value="Alta">Alta</option>
                                    <option value="Media">Media</option>
                                    <option value="Baja">Baja</option>
                                </select>

                                <button type="submit" id="addTaskBtn">Agregar Tarea</button>
                            </form>

                            <!-- Lista de tareas que Script2.js rellenará dinámicamente -->
                            <ul class="task-list" id="taskList"></ul>
                        </div>
                    </section>




                    <section id="calendarSection" style="display:none;">
                        <h2>Calendario</h2>
                        <div id="calendar"></div>
                    </section>


                    <section id="notesSection" style="display:none;">
                        <h2>Mis Notas</h2>
                        <textarea id="notes" placeholder="Escribe tus notas aquí..."></textarea>
                    </section>


                </main>
            </div>

            <div>
                <h3>Filtros y Búsqueda</h3>

                <div class="filter-group">
                    <label for="searchInput">Buscar tarea:</label>
                    <input type="text" id="searchInput" placeholder="Escribe para buscar..." />
                </div>

                <div class="filter-group">
                    <p>Categorías:</p>
                    <ul class="category-filters" id="categoryFilters">
                        <li><button class="filter-btn active" data-category="Todas">Todas</button></li>
                        <li><button class="filter-btn" data-category="Trabajo">Trabajo</button></li>
                        <li><button class="filter-btn" data-category="Formación">Formación</button></li>
                        <li><button class="filter-btn" data-category="Equipo">Equipo</button></li>
                    </ul>
                </div>
            </div>

        </div>




        <script src="Script2.js"></script>





        <footer>
            <p>&copy; Marzo 2026 Mi AppOrk.  Todos los derechos reservados (ork C) </p>
        </footer>
    </body>
</html>
